<!DOCTYPE html>
<html>
<head>
    <title>Deals - GearX</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="header">
    <h1>🔥 Hot Deals</h1>
</div>

<div class="container">

    <!-- iPhone -->

    <div class="card">
        <span class="tag">HOT</span>

        <h3>iPhone</h3>

        <p class="price">₹79,999 → ₹71,999</p>

        <div class="buttons">

            <a href="/cart">
                <button class="cart-btn">
                    Add To Cart
                </button>
            </a>

            <a href="/login">
                <button class="buy-btn">
                    Buy Now
                </button>
            </a>

        </div>
    </div>


    <!-- Samsung -->

    <div class="card">
        <span class="tag">SALE</span>

        <h3>Samsung</h3>

        <p class="price">₹69,999 → ₹59,999</p>

        <div class="buttons">

            <a href="/cart">
                <button class="cart-btn">
                    Add To Cart
                </button>
            </a>

            <a href="/login">
                <button class="buy-btn">
                    Buy Now
                </button>
            </a>

        </div>
    </div>


    <!-- Combo -->

    <div class="card">
        <span class="tag">COMBO</span>

        <h3>Watch + Earbuds</h3>

        <p class="price">₹4,999 → ₹3,999</p>

        <div class="buttons">

            <a href="/cart">
                <button class="cart-btn">
                    Add To Cart
                </button>
            </a>

            <a href="/login">
                <button class="buy-btn">
                    Buy Now
                </button>
            </a>

        </div>
    </div>

</div>

</body>
</html>
