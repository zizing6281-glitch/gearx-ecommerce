<!DOCTYPE html>
<html>
<head>
    <title>Deals - GearX</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #E8DFD2;
        }

        .header {
            background: #BC6C4D;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        .card {
            background: #F9F7F2;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .tag {
            background: #767D52;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            font-size: 12px;
        }

        .price {
            color: #BC6C4D;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🔥 Hot Deals</h1>
</div>

<div class="container">

    <div class="card">
        <span class="tag">HOT</span>
        <h3>iPhone</h3>
        <p class="price">₹79,999 → ₹71,999</p>
    </div>

    <div class="card">
        <span class="tag">SALE</span>
        <h3>Samsung</h3>
        <p class="price">₹69,999 → ₹59,999</p>
    </div>

    <div class="card">
        <span class="tag">COMBO</span>
        <h3>Watch + Earbuds</h3>
        <p class="price">₹4,999 → ₹3,999</p>
    </div>

</div>

</body>
</html>
